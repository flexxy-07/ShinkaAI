services:
  - type: web
    name: shinkaai-backend
    env: python
    plan: free
    rootDir: server
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Update this to match your Python version if needed
